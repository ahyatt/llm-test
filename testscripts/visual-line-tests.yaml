group: visual-line-mode
setup: |
  Evaluate the following to create a buffer with visual-line-mode:

    (progn
      (switch-to-buffer "test-wrap")
      (visual-line-mode 1))

  The frame is 80 columns wide, 40 lines tall.
  The buffer "test-wrap" has visual-line-mode enabled, which means
  long lines wrap visually at the window edge without inserting
  actual newline characters.

tests:
  - description: |
      Type a sentence that is much longer than 80 characters into
      the buffer using type-text.
      Verify that:
        1. The text appears on more than one display line (it wraps).
        2. The text contains no actual newline characters (verify this solely by checking that none of the strings in the 'lines' array end with a newline character, do NOT use eval-elisp for this).
